<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BIS End-to-End Approach</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: #111827;
      }

      object {
        display: block;
        width: 100%;
        height: 100vh;
        border: 0;
      }

      .fallback {
        box-sizing: border-box;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 2rem;
        color: #f9fafb;
        text-align: center;
      }

      .fallback a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <object data="bis-endtoend-approach.pdf" type="application/pdf">
      <div class="fallback">
        <p>
          Your browser cannot display this PDF inline.
          <a href="bis-endtoend-approach.pdf">Open the PDF directly</a>.
        </p>
      </div>
    </object>
  </body>
</html>
